<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Mirza's GFX Work Gallery">
  <link rel="icon" href="https://salrn.github.io/publicfiles/rs.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <title>mirza's gfx gallery</title>
  <style>
    :root {
      --bg: #080808;
      --surface: #111111;
      --surface2: #181818;
      --border: rgba(255,255,255,0.07);
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8ff40;
      --radius-card: 16px;
      --radius-card-hover: 6px;
      --aero-url: url('projectsite-resources/0579cdc9d0db3077bed6ae2484d6a51f (2).png');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── AERO MIXIN ─── */
    .aero {
      position: relative;
    }
    .aero::after {
      content: '';
      position: absolute;
      inset: -4px;
      background-image: var(--aero-url);
      background-repeat: no-repeat;
      background-size: 100% 100%;
      /* 9-slice via border-image so it tiles like SliceType */
      border-image: var(--aero-url) 10 fill / 10px / 0px stretch;
      opacity: 0.5;
      pointer-events: none;
      image-rendering: pixelated;
      z-index: 2;
      border-radius: inherit;
    }

    /* ─── HEADER ─── */
    .header {
      padding: 28px 44px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,8,8,0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }

    .header h1 {
      font-family: 'Dela Gothic One', cursive;
      font-size: 26px;
      letter-spacing: -0.5px;
      transform: rotate(-2.5deg);
      display: inline-block;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(200,255,64,0.25);
    }

    .back-btn {
      padding: 9px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      position: relative;
    }
    .back-btn.aero::after { border-radius: 10px; }
    .back-btn:hover {
      background: var(--surface);
      border-color: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    /* ─── GALLERY GRID ─── */
    .gallery {
      padding: 44px 28px;
      columns: 4 260px;
      column-gap: 18px;
      max-width: 1680px;
      margin: 0 auto;
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 18px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      border-radius: var(--radius-card);
      background: var(--surface);
      will-change: transform;
      /* spring transform set via JS */
      transition: border-radius 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    .gallery-item:hover {
      border-radius: var(--radius-card-hover);
    }

    .gallery-item img {
      width: 100%;
      height: auto;
      display: block;
      /* blur-up placeholder */
      filter: blur(12px) brightness(0.7);
      transition: filter 0.6s ease;
    }
    .gallery-item img.loaded {
      filter: none;
    }

    /* dark overlay on hover — handled by JS spring opacity */
    .gallery-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.25);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 1;
    }
    .gallery-item:hover .overlay {
      opacity: 1;
    }

    /* ─── LOADING / ERROR ─── */
    .status {
      text-align: center;
      padding: 80px 20px;
      font-size: 15px;
      color: var(--muted);
    }
    .status.error { color: #ff6b6b; }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.0);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 24px;
      pointer-events: none;
      transition: background 0.3s;
    }
    .lightbox.active {
      pointer-events: all;
      background: rgba(0,0,0,0.92);
    }

    .lightbox-content {
      max-width: 90vw;
      max-height: 90vh;
      position: relative;
      will-change: transform, opacity;
    }

    .lightbox-content img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 14px;
      display: block;
      box-shadow: 0 40px 120px rgba(0,0,0,0.8);
    }

    .lightbox-close {
      position: fixed;
      top: 24px;
      right: 28px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 22px;
      width: 40px;
      height: 40px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.2s;
      z-index: 1010;
    }
    .lightbox-close:hover { background: #2a2a2a; transform: rotate(90deg); }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 26px;
      padding: 14px 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      z-index: 1010;
      line-height: 1;
    }
    .lightbox-nav:hover { background: #2a2a2a; }
    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1200px) { .gallery { columns: 3 220px; } }
    @media (max-width: 768px) {
      .gallery { columns: 2 160px; padding: 24px 14px; }
      .header { padding: 16px 20px; }
      .header h1 { font-size: 19px; }
    }
    @media (max-width: 420px) { .gallery { columns: 1; } }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">
      <!-- Art palette SVG icon -->
      <svg class="header-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="16" fill="#1a1a1a" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
        <path d="M18 8C12.477 8 8 12.477 8 18c0 2.21 1.79 4 4 4a2 2 0 0 1 2 2c0 1.105.895 2 2 2 5.523 0 10-4.477 10-10S23.523 8 18 8Z" fill="#c8ff40" opacity="0.85"/>
        <circle cx="13" cy="16" r="1.5" fill="#080808"/>
        <circle cx="18" cy="12" r="1.5" fill="#080808"/>
        <circle cx="23" cy="16" r="1.5" fill="#080808"/>
        <circle cx="21" cy="21.5" r="1.5" fill="#080808"/>
      </svg>
      <h1>GFX Gallery</h1>
    </div>
    <a href="portfolio.html" class="back-btn aero">← Back</a>
  </div>

  <div id="status" class="status">Loading gallery...</div>
  <div id="gallery" class="gallery"></div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">✕</button>
    <button class="lightbox-nav lightbox-prev" id="lbPrev">‹</button>
    <div class="lightbox-content" id="lbContent">
      <img id="lightboxImg" src="" alt="Gallery Image">
    </div>
    <button class="lightbox-nav lightbox-next" id="lbNext">›</button>
  </div>

  <script>
    // ─── SPRING SYSTEM (ported from Lua spring module) ─────────────────────────
    // Underdamped/critically-damped spring solver, same math as the roblox module
    const E = Math.E;

    function makeSpring(init, damping, speed) {
      let d = damping ?? 0.6;
      let s = speed  ?? 12;
      let p0 = init, v0 = 0, p1 = init, t0 = performance.now() / 1000;
      let h = 0, c1 = 0, c2 = 0;

      function updateK() {
        if (s === 0) { h = c1 = c2 = 0; return; }
        if (d < 0.99999999) {
          h  = Math.sqrt(1 - d*d);
          c1 = p0 - p1;
          c2 = d / h * c1 + v0 / (h * s);
        } else if (d < 1.00000001) {
          h  = 0;
          c1 = p0 - p1;
          c2 = c1 + v0 / s;
        } else {
          h  = Math.sqrt(d*d - 1);
          const a = -v0 / (2 * s * h);
          const b = -(p1 - p0) / 2;
          c1 = (1 - d/h) * b + a;
          c2 = (1 + d/h) * b - a;
        }
      }

      function pos(x) {
        if (s === 0 || x < 0.0001) return p0;
        if (d < 0.99999999) {
          const co = Math.cos(h*s*x), si = Math.sin(h*s*x);
          const ex = Math.pow(E, d*s*x);
          return co/ex*c1 + si/ex*c2 + p1;
        } else if (d < 1.00000001) {
          const ex = Math.pow(E, s*x);
          return (c1 + s*x*c2) / ex + p1;
        } else {
          return c1 * Math.pow(E, (-d-h)*s*x) + c2 * Math.pow(E, (-d+h)*s*x) + p1;
        }
      }

      function vel(x) {
        if (s === 0 || x < 0.0001) return v0;
        if (d < 0.99999999) {
          const co = Math.cos(h*s*x), si = Math.sin(h*s*x);
          const ex = Math.pow(E, d*s*x);
          return s*(co*h - d*si)/ex*c2 - s*(co*d + h*si)/ex*c1;
        } else if (d < 1.00000001) {
          const ex = Math.pow(E, s*x);
          return -s/ex*(c1 + (s*x-1)*c2);
        } else {
          return c2*(h-d)*s*Math.pow(E,(-d+h)*s*x) - c1*(d+h)*s*Math.pow(E,(-d-h)*s*x);
        }
      }

      updateK();

      return {
        get p() { return pos((performance.now()/1000) - t0); },
        get v() { return vel((performance.now()/1000) - t0); },
        get t() { return p1; },
        set t(v) {
          const now = performance.now()/1000;
          p0 = pos(now - t0);
          v0 = vel(now - t0);
          p1 = v; t0 = now;
          updateK();
        },
        setD(val) {
          const now = performance.now()/1000;
          p0 = pos(now - t0); v0 = vel(now - t0);
          d = val; t0 = now; updateK();
        },
        setS(val) {
          const now = performance.now()/1000;
          p0 = pos(now - t0); v0 = vel(now - t0);
          s = val; t0 = now; updateK();
        },
        isSettled(eps = 0.01) {
          const now = performance.now()/1000;
          return Math.abs(pos(now-t0) - p1) < eps && Math.abs(vel(now-t0)) < eps;
        }
      };
    }

    // ─── GALLERY STATE ──────────────────────────────────────────────────────────
    const galleryEl  = document.getElementById('gallery');
    const statusEl   = document.getElementById('status');
    const lightbox   = document.getElementById('lightbox');
    const lbContent  = document.getElementById('lbContent');
    const lbImg      = document.getElementById('lightboxImg');
    const lbClose    = document.getElementById('lbClose');
    const lbPrev     = document.getElementById('lbPrev');
    const lbNext     = document.getElementById('lbNext');

    let imageUrls = [];
    let currentIdx = 0;
    let lbOpen = false;

    // Per-card spring state
    const cards = []; // { el, springs: {y, rot, scale}, idlePhase, idleRot }

    // Lightbox springs
    const lbScale   = makeSpring(0.88, 0.55, 14);
    const lbOpacity = makeSpring(0,    0.7,  16);
    let lbRafId = null;

    // ─── RAF LOOP ────────────────────────────────────────────────────────────────
    let rafId = null;
    let lastTime = 0;

    function tick(now) {
      rafId = requestAnimationFrame(tick);
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      const idle = now / 1000;

      for (const card of cards) {
        if (!card.visible) continue;

        // Idle sway — very subtle Lissajous wobble
        const sway = Math.sin(idle * 0.55 + card.idlePhase) * 1.2;
        const swayRot = Math.sin(idle * 0.4  + card.idlePhase + 1) * 0.4;

        const sy = card.springs.y.p;
        const sr = card.springs.rot.p;
        const ss = card.springs.scale.p;

        card.el.style.transform =
          `translateY(${sy + sway}px) rotate(${sr + swayRot}deg) scale(${ss})`;

        // Settle check — if hovered keep going, if idle check if we can skip
        // (keep running regardless; idle sway never settles intentionally)
      }

      // Lightbox
      if (lbOpen || !lbScale.isSettled(0.005)) {
        const sc = lbScale.p;
        const op = lbOpacity.p;
        lbContent.style.transform = `scale(${Math.max(0.01, sc)})`;
        lbContent.style.opacity   = Math.max(0, op);
      }
    }

    // ─── GALLERY LOAD ───────────────────────────────────────────────────────────
    const imgExts = ['jpg','jpeg','png','gif','webp','svg','bmp'];

    async function loadGallery() {
      try {
        const res = await fetch('https://api.github.com/repos/salrn/salrn.github.io/contents/gfxwork');
        if (!res.ok) throw new Error('fetch failed');
        const files = await res.json();

        const imgs = files.filter(f => {
          const ext = f.name.split('.').pop().toLowerCase();
          return imgExts.includes(ext) && f.type === 'file';
        });

        if (!imgs.length) throw new Error('No images found');

        imageUrls = imgs.map(f => f.download_url);
        statusEl.style.display = 'none';
        buildCards(imgs);
        setupIntersectionObserver();

        rafId = requestAnimationFrame(tick);

      } catch(e) {
        statusEl.textContent = 'Failed to load gallery. Make sure the folder exists and contains images.';
        statusEl.classList.add('error');
      }
    }

    function buildCards(imgs) {
      imgs.forEach((file, i) => {
        const item = document.createElement('div');
        item.className = 'gallery-item aero';

        const overlay = document.createElement('div');
        overlay.className = 'overlay';

        const img = document.createElement('img');
        // data-src for lazy loading; src is a tiny transparent gif placeholder
        img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
        img.dataset.src = file.download_url;
        img.alt = file.name;

        item.appendChild(overlay);
        item.appendChild(img);
        galleryEl.appendChild(item);

        // Per-card random idle phase and hover rotation
        const idlePhase  = Math.random() * Math.PI * 2;
        const hoverRot   = (Math.random() - 0.5) * 4.5; // -2.25 .. +2.25 deg

        const springs = {
          y:     makeSpring(0,   0.52, 13),
          rot:   makeSpring(0,   0.52, 13),
          scale: makeSpring(1,   0.55, 12),
        };

        item.addEventListener('mouseenter', () => {
          springs.y.t     = -18;
          springs.rot.t   = hoverRot;
          springs.scale.t = 1.04;
        });
        item.addEventListener('mouseleave', () => {
          springs.y.t     = 0;
          springs.rot.t   = 0;
          springs.scale.t = 1;
        });
        item.addEventListener('mousedown', () => {
          springs.scale.t = 0.97;
        });
        item.addEventListener('mouseup', () => {
          springs.scale.t = 1.04;
        });

        item.onclick = () => openLightbox(i);

        cards.push({ el: item, springs, idlePhase, hoverRot, visible: false });
      });
    }

    // ─── LAZY LOAD VIA INTERSECTION OBSERVER ────────────────────────────────────
    function setupIntersectionObserver() {
      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const idx = [...galleryEl.children].indexOf(entry.target);
          if (idx < 0) return;
          const card = cards[idx];
          card.visible = entry.isIntersecting;

          if (entry.isIntersecting) {
            const img = entry.target.querySelector('img');
            if (img && img.dataset.src && img.src !== img.dataset.src) {
              // Load image
              const real = new Image();
              real.onload = () => {
                img.src = img.dataset.src;
                img.classList.add('loaded');
              };
              real.src = img.dataset.src;
            }
          }
        });
      }, { rootMargin: '200px' });

      document.querySelectorAll('.gallery-item').forEach(el => obs.observe(el));
    }

    // ─── LIGHTBOX ───────────────────────────────────────────────────────────────
    function openLightbox(idx) {
      currentIdx = idx;
      lbImg.src = imageUrls[idx];
      lbImg.classList.remove('loaded');
      lbImg.onload = () => lbImg.classList.add('loaded');

      lbOpen = true;
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';

      // Spring in
      lbScale.t   = 0.88; // start low instantly
      lbOpacity.t = 0;
      // force position reset then spring to 1
      setTimeout(() => {
        lbScale.t   = 1;
        lbOpacity.t = 1;
      }, 16);
    }

    function closeLightbox() {
      lbOpen = false;
      lbScale.t   = 0.85;
      lbOpacity.t = 0;
      setTimeout(() => {
        lightbox.classList.remove('active');
        document.body.style.overflow = '';
        lbImg.src = '';
      }, 320);
    }

    function navigateLightbox(dir) {
      currentIdx = (currentIdx + dir + imageUrls.length) % imageUrls.length;

      // Bounce spring
      const bounce = dir > 0 ? 0.88 : 1.12;
      lbScale.t = bounce;
      setTimeout(() => { lbScale.t = 1; }, 30);

      lbImg.classList.remove('loaded');
      lbImg.src = imageUrls[currentIdx];
      lbImg.onload = () => lbImg.classList.add('loaded');
    }

    // Close on backdrop click
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });
    lbClose.onclick = closeLightbox;
    lbPrev.onclick  = e => { e.stopPropagation(); navigateLightbox(-1); };
    lbNext.onclick  = e => { e.stopPropagation(); navigateLightbox(1); };

    // Keyboard nav
    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   navigateLightbox(-1);
      if (e.key === 'ArrowRight')  navigateLightbox(1);
    });

    // ─── BOOT ────────────────────────────────────────────────────────────────────
    lastTime = performance.now();
    loadGallery();
  </script>
</body>
</html>
